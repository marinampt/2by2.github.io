    <script

      src="https://polyfill.io/v3/polyfill.min.js?features=IntersectionObserver%2CIntersectionObserverEntry&flags=gated"
    ></script>
   <script>
const menuItems = document.querySelectorAll("#menu-bar .menu-item[href]");
const sections = document.querySelectorAll("main section");

menuItems.forEach(item => {
  item.addEventListener("click", (e) => {
    e.preventDefault();

    const targetId = item.getAttribute("href").substring(1);

    // hide all sections
    sections.forEach(section => {
      section.classList.remove("active");
    });

    // show selected section
    const targetSection = document.getElementById(targetId);
    if (targetSection) {
      targetSection.classList.add("active");

      // 🔥 scroll to the top of that section
      targetSection.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }
  });
});
    </script>
